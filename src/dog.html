<html>
<head>
    <meta charset="UTF-8">
    <title>Dog Details</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="stylesheet" type="text/css" href="dog.css">
    
    <script src="script.js"></script>
    <script src="dog.js"></script>
</head>
<body>
    <header>
        <h1><span id="dog-name-header"></span> Details</h1>
    </header>

    <main>
        <div class="image-container">
            <img id="dog-image" src="" alt="Dog Image">
        </div>

        <div id="dog-info-container">
            <p><strong>Name:</strong> <span id="dog-name"></span></p>
            <p><strong>Breed:</strong> <span id="dog-breed"></span></p>
            <p><strong>Age:</strong> <span id="dog-age"></span></p>
            <p><strong>Sex:</strong> <span id="dog-sex"></span></p>
            
            <p><strong>House Trained:</strong> <span id="dog-house-trained"></span></p>
            <p><strong>Vaccinated:</strong> <span id="dog-vaccinated"></span></p>
            
            <p><strong>Story:</strong></p>
            <p id="dog-story"></p>
        </div>

        <div class="actions">
            <a id="adopt-link" class="btn">Adopt Me!</a>
        </div>

        <nav class="dog-navigation">
            <button class="btn" id="prev-btn">Prev</button>
            <button class="btn" id="next-btn">Next</button>
        </nav>

        <br>
        <a class="btn" href="index.html">Back to list</a>
    </main>
</body>
</html>
