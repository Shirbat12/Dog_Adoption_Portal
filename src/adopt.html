<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt a Dog</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="adopt.css">
</head>
<body>
    <header>Dog Adoption Portal</header>

    <main>
        <h1 id="adopt-heading">Adopt Dog</h1>

        <div id="dog-summary">
            <img id="dog-summary-image" src="" alt="Dog Image">
            <h2 id="dog-summary-name"></h2>
        </div>

        <form id="adopt-form">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required>
            </div>

            <button type="submit" class="btn">Send</button>
        </form>

        <a href="index.html" class="back-link">Back to list</a>
    </main>

    <div class="peeking-dog-container">
        <div class="peeking-dog-image"></div>
    </div>

    <script src="script.js"></script>
    <script src="adopt.js"></script>
</body>
</html>
